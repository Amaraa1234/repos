<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тооны Машин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e9ecef;
        }

        .calculator {
            background: #ffffff;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            width: 320px; 
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .display-container {
            width: 100%;
            background-color: #f1f3f5;
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .display {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 3rem;
            font-weight: 700;
            text-align: right;
            color: #2b2e35;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            width: 100%;
            height: 62px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #212529;
            background-color: #f8f9fa;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.1s ease;
            outline: none;
            user-select: none;
        }

        button:hover {
            background-color: #e9ecef;
            transform: translateY(-1px);
        }

        .clear-btn {
            background-color: #fff0f6;
            color: #d6336c;
        }
        .clear-btn:hover {
            background-color: #ffdeeb;
        }

        .scientific {
            background-color: #e3fafc; 
            color: #0ca678;
        }
        .scientific:hover {
            background-color: #c5f6fa;
        }

        .operator {
            background-color: #fff9db;
            color: #f59f00;
        }
        .operator:hover {
            background-color: #fff3bf;
        }

        .equals-btn {
            background-color: #12b886 !important;
            color: #ffffff !important;
        }
        .equals-btn:hover {
            background-color: #0ca678 !important;
            box-shadow: 0 4px 12px rgba(18, 184, 134, 0.2);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display-container">
            <input type="text" class="display" id="display" value="0" readonly>
        </div>
        
        <div class="buttons-grid">
            <button class="scientific" onclick="runScientific('sqrt')">√</button>
            <button class="scientific" onclick="runScientific('sin')">sin</button>
            <button class="scientific" onclick="runScientific('cos')">cos</button>
            <button class="operator" onclick="appendValue('/')">/</button>

            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">*</button>

            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button class="clear-btn" onclick="clearDisplay()">C</button>
            <button class="number" onclick="appendValue('0')">0</button>
            <button class="number" onclick="appendValue('.')">.</button>
            <button class="operator equals-btn" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let shouldResetDisplay = false;

        function appendValue(val) {
            const lastChar = display.value.slice(-1);
            
            if (shouldResetDisplay && !['+', '-', '*', '/'].includes(val)) {
                display.value = '0';
                shouldResetDisplay = false;
            } else {
                shouldResetDisplay = false;
            }

            if (display.value === '0' && val !== '.') {
                display.value = val;
            } else {
                if (['+', '-', '*', '/'].includes(lastChar) && ['+', '-', '*', '/'].includes(val)) {
                    display.value = display.value.slice(0, -1) + val;
                } else {
                    display.value += val;
                }
            }
        }

        function clearDisplay() {
            display.value = '0';
            shouldResetDisplay = false;
        }

        function runScientific(type) {
            try {
                let currentVal = eval(display.value);
                if (isNaN(currentVal)) return;
                
                let result;
                if (type === 'sin') {
                    result = Math.sin(currentVal); 
                } else if (type === 'cos') {
                    result = Math.cos(currentVal);
                } else if (type === 'sqrt') {
                    // Сөрөг тооны язгуур гаргавал алдаа заана
                    if (currentVal < 0) {
                        display.value = 'Error';
                        return;
                    }
                    result = Math.sqrt(currentVal);
                }
                
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(4));
                }
                display.value = result;
                shouldResetDisplay = true;
            } catch (error) {
                display.value = 'Error';
            }
        }

        function calculate() {
            try {
                if (display.value.trim() !== "") {
                    let result = eval(display.value);
                    
                    if (result % 1 !== 0) {
                        result = parseFloat(result.toFixed(4));
                    }
                    display.value = result;
                    shouldResetDisplay = true;
                }
            } catch (error) {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
